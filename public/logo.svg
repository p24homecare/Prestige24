  <!-- Heart shape (sky blue) - intertwined with clock -->
  <path d="M208 12 C200 4, 188 4, 186 14 C184 22, 192 30, 208 42 C224 30, 232 22, 230 14 C228 4, 216 4, 208 12 Z" fill="#6CB4EE" opacity="0.85"/>

  <!-- Clock circle (amber/gold) -->
